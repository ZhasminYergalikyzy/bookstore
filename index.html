<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Букинистический Магазин</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script defer src="script.js"></script>
</head>
<body>

    <header>
        <div class="logo">Букинист</div>
        <nav>
            <a href="#">Каталог</a>
            <a href="#">Сдать книгу</a>
            <a href="#">О нас</a>
            <a href="#">Контакты</a>
        </nav>
        <div class="search-bar">
            <input type="text" placeholder="Поиск книг...">
            <button>🔍</button>
        </div>
    </header>

   
    <section class="banner">
        <div class="banner-text">
            <h1>Добро пожаловать в Букинист</h1>
            <p>Продайте свои книги или найдите лучшие предложения!</p>
        </div>
    </section>

    <section class="carousel">
        <div class="carousel-container">
            <div class="carousel-item active">
                <img src="1photo.jpg.WEBP" alt="Акция 1">
                
            </div>
            <div class="carousel-item">
                <img src="2photo.jpg.WEBP" alt="Акция 2">
                
            </div>
            <!-- <div class="carousel-item">
                <img src="banner3.jpg" alt="Акция 3">
                <div class="carousel-caption">
                    <h2>Примите участие в благотворительности</h2>
                    <p>Пожертвуйте свои книги, чтобы помочь другим.</p>
                </div>
            </div> -->
        </div>
        <div class="carousel-controls">
            <button class="prev">‹</button>
            <button class="next">›</button>
        </div>
    </section>
    

    
    <section class="categories">
        <h2>Категории</h2>
        <div class="category-list">
            <div class="category">Фантастика</div>
            <div class="category">Романы</div>
            <div class="category">Детективы</div>
            <div class="category">Учебники</div>
            <div class="category">Другое</div>
        </div>
    </section>

    
    <section class="popular-books container mt-5">
        <h2 class="text-center mb-4">Популярные книги</h2>
        <div class="row">
            <div class="col-md-4 mb-4 d-flex justify-content-center">
                <div class="card">
                    <img src="harry_potter_1.jpg" class="card-img-top" alt="Книга 1">
                    <div class="card-body text-center">
                        <h5 class="card-title">Название книги</h5>
                        <p class="card-text">500₸</p>
                        <button class="btn btn-primary" data-book-id="1">Купить</button>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-4 d-flex justify-content-center">
                <div class="card">
                    <img src="harry_potter_1.jpg" class="card-img-top" alt="Книга 2">
                    <div class="card-body text-center">
                        <h5 class="card-title">Название книги</h5>
                        <p class="card-text">500₸</p>
                        <button class="btn btn-primary" data-book-id="1">Купить</button>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-4 d-flex justify-content-center">
                <div class="card">
                    <img src="harry_potter_1.jpg" class="card-img-top" alt="Книга 3">
                    <div class="card-body text-center">
                        <h5 class="card-title">Название книги</h5>
                        <p class="card-text">500₸</p>
                        <button class="btn btn-primary" data-book-id="1">Купить</button>
                    </div>
                </div>
            </div>
            
        </div>
    </section>
    
    <footer>
        <p>Zhasmin Yergalikyzy.</p>
    </footer>
</body>
</html>
